<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarang 的秘密天地</title>
    <style>
        :root {
            --main-brown: #7a5537;
            --soft-yellow: #fff9e6;
            --accent-pink: #ff8fb1;
            --border-thick: 3px solid var(--main-brown);
        }

        body {
            background-color: var(--soft-yellow);
            font-family: 'PingFang SC', sans-serif;
            margin: 0;
            padding: 20px;
            color: var(--main-brown);
        }

        .container {
            max-width: 450px;
            margin: 0 auto;
        }

        /* 返回键样式 */
        .back-nav { margin-bottom: 20px; }
        .back-link {
            text-decoration: none;
            color: var(--main-brown);
            font-weight: bold;
            background: #fff;
            padding: 8px 15px;
            border: var(--border-thick);
            border-radius: 50px;
            box-shadow: 4px 4px 0 var(--main-brown);
            display: inline-block;
        }

        /* 卡片通用样式 */
        .card {
            background: white;
            border: var(--border-thick);
            border-radius: 25px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 6px 6px 0 var(--main-brown);
        }

        h2 { font-size: 1.2rem; margin-top: 0; }

        /* 点菜区动画 */
        .food-slot {
            background: #fdf6e3;
            border: 2px dashed var(--main-brown);
            border-radius: 15px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
            color: #e67e22;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .btn-pick {
            width: 100%;
            background: var(--accent-pink);
            color: white;
            border: var(--border-thick);
            padding: 12px;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 var(--main-brown);
            transition: 0.1s;
        }
        .btn-pick:active { transform: translateY(4px); box-shadow: 0 0 0 var(--main-brown); }

        /* 歌单网格 */
        .music-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .music-item {
            border: 2px solid var(--main-brown);
            border-radius: 12px;
            padding: 10px;
            text-decoration: none;
            color: var(--main-brown);
            text-align: center;
            font-size: 14px;
        }

        /* 简单动画 */
        .pop { animation: popScale 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popScale {
            0% { transform: scale(0.7); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .watermark {
            text-align: center;
            font-size: 10px;
            opacity: 0.2;
            margin-top: 30px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="back-nav">
        <a href="index.html" class="back-link">👈 返回小窝</a>
    </div>

    <div class="card">
        <h2>🍱 莎朗的点名时间</h2>
        <div class="food-slot" id="food-result">今天吃什么？</div>
        <button class="btn-pick" onclick="startRolling()">✨ 随机点菜</button>
    </div>

    <div class="card">
        <h2>🎵 收藏歌单</h2>
        <div class="music-grid">
            <a href="http://t.cn/AXcCNzoH" target="_blank" class="music-item">QQ 音乐</a>
            <a href="https://163cn.tv/2izY3UE" target="_blank" class="music-item">网易云</a>
            <a href="http://t.cn/AXcCD6ez" target="_blank" class="music-item">Apple</a>
            <a href="http://t.cn/AXcCFypr" target="_blank" class="music-item">Spotify</a>
        </div>
    </div>

    <div class="watermark">Designed by Sarang 🐾</div>
</div>

<script src="menu.js"></script>

<script>
    let isRolling = false;

    function startRolling() {
        if (isRolling) return;
        isRolling = true;
        
        const display = document.getElementById('food-result');
        display.classList.remove('pop');
        
        let count = 0;
        const maxScroll = 12; // 滚动次数

        const timer = setInterval(() => {
            // 从引入的 myMenu 数组中随机取值
            const randomIndex = Math.floor(Math.random() * myMenu.length);
            display.innerText = myMenu[randomIndex];
            count++;

            if (count >= maxScroll) {
                clearInterval(timer);
                isRolling = false;
                // 最终结果
                const finalIndex = Math.floor(Math.random() * myMenu.length);
                display.innerHTML = "🌟 " + myMenu[finalIndex] + " 🌟";
                display.classList.add('pop'); // 触发弹出动画
            }
        }, 60);
    }
</script>

</body>
</html>
