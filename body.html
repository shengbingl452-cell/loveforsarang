<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>莎朗的秘密基地 🥭</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');

        :root {
            --main-brown: #7a5537;
            --soft-yellow: #fdf6e3;
            --accent-pink: #ff8fb1;
            --accent-yellow: #ffd24d;
            --bg-dots: #d1c9bc;
        }

        body {
            background-color: #e9e4db;
            background-image: radial-gradient(var(--bg-dots) 1px, transparent 1px);
            background-size: 20px 20px;
            font-family: 'ZCOOL KuaiLe', "PingFang SC", sans-serif;
            margin: 0;
            padding: 20px;
            color: var(--main-brown);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: min(100%, 420px);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 顶部导航 */
        .nav-header {
            width: 100%;
            display: flex;
            justify-content: flex-start;
            margin-bottom: 20px;
        }

        .back-home {
            text-decoration: none;
            background: #fff;
            border: 3px solid var(--main-brown);
            padding: 5px 15px;
            border-radius: 20px;
            color: var(--main-brown);
            font-weight: bold;
            box-shadow: 4px 4px 0px var(--main-brown);
            transition: 0.2s;
        }

        .back-home:active { transform: translate(2px, 2px); box-shadow: 0 0 0; }

        /* 语言切换 */
        .lang-switch { margin: 0 0 15px; display: flex; gap: 8px; }
        .lang-switch button {
            background: #fff; border: 2px solid var(--main-brown); border-radius: 8px;
            padding: 4px 12px; cursor: pointer; font-family: inherit; font-size: 12px;
            transition: 0.2s;
        }
        .lang-switch button:hover { background: var(--accent-yellow); }

        /* 卡片基础样式 */
        .paper-card {
            background: #fff;
            border: 4px solid var(--main-brown);
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 8px 8px 0px rgba(122, 85, 55, 0.1);
            position: relative;
        }

        h2 {
            text-align: center;
            font-size: 22px;
            margin-top: 0;
            margin-bottom: 15px;
            background: var(--accent-yellow);
            display: inline-block;
            padding: 2px 12px;
            border-radius: 10px;
            transform: rotate(-2deg);
        }

        /* 随机点菜区 */
        .slot-machine {
            background: #fffbeb;
            border: 3px dashed var(--main-brown);
            border-radius: 20px;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #ff6b9a;
            margin: 15px 0;
            text-align: center;
            padding: 0 10px;
        }

        .btn-magic {
            width: 100%;
            background: var(--accent-pink);
            color: white;
            border: 3px solid var(--main-brown);
            padding: 12px;
            border-radius: 20px;
            font-size: 18px;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 0 5px 0 var(--main-brown);
            transition: 0.1s;
        }

        .btn-magic:active { transform: translateY(4px); box-shadow: 0 0 0; }

        /* 歌单列表 */
        .playlist-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .music-tag {
            background: #fff;
            border: 2px solid var(--main-brown);
            border-radius: 15px;
            padding: 8px;
            text-decoration: none;
            color: var(--main-brown);
            text-align: center;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .music-tag:hover { background: var(--soft-yellow); }

        /* 心情区域 */
        .mood-grid {
            display: flex;
            justify-content: space-around;
            margin-top: 10px;
        }

        .mood-item {
            font-size: 30px;
            cursor: pointer;
            transition: transform 0.2s;
            filter: grayscale(100%);
            opacity: 0.5;
        }

        .mood-item.active {
            filter: grayscale(0);
            opacity: 1;
            transform: scale(1.3);
        }

        /* 水印 */
        .mini-mark {
            text-align: center;
            font-size: 10px;
            opacity: 0.3;
            margin-top: 20px;
            letter-spacing: 2px;
        }

        /* 动画类 */
        .bounce-in {
            animation: bounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="nav-header">
        <a href="index.html" class="back-home" id="back-home">🐾 返回窝里</a>
    </div>

    <div class="lang-switch">
        <button onclick="changeLang('en')">English</button>
        <button onclick="changeLang('ko')">한국어</button>
        <button onclick="changeLang('zh')">中文</button>
    </div>

    <div class="paper-card" style="text-align: center;">
        <h2 id="menu-title">🍱 랑menu</h2>
        <div class="slot-machine" id="food-box">想吃什么呀？</div>
        <button class="btn-magic" id="menu-btn" onclick="rollFood()">给我变！✨</button>
    </div>

    <div class="paper-card">
        <h2 id="music-title" style="background: #a2d2ff;">🎵 音乐补给站</h2>
        <div class="playlist-row">
            <a href="http://t.cn/AXcCNzoH" target="_blank" class="music-tag" id="music-qq">🟢 QQ 音乐</a>
            <a href="https://163cn.tv/2izY3UE" target="_blank" class="music-tag" id="music-netease">🔴 网易云</a>
            <a href="http://t.cn/AXcCD6ez" target="_blank" class="music-tag" id="music-apple">🍎 Apple</a>
            <a href="https://open.spotify.com/playlist/2pTSSNGXUBUWeGqq6Ljy8E?si=lGt_FnFXQIOnQAsgcL1Z8g&pi=swsS0j2uRD2dP" target="_blank" class="music-tag" id="music-spotify">🍏 Spotify</a>
        </div>
    </div>

    <div class="paper-card">
        <h2 id="mood-title" style="background: #cdb4db;">☁️ 今日云心情</h2>
        <div class="mood-grid">
            <span class="mood-item" onclick="setMood(this)">😊</span>
            <span class="mood-item" onclick="setMood(this)">😐</span>
            <span class="mood-item" onclick="setMood(this)">😴</span>
            <span class="mood-item" onclick="setMood(this)">🔥</span>
        </div>
        <p id="mood-info" style="text-align:center; font-size:12px; color:#8b7b6c; margin-top:15px;"></p>
    </div>

    <div class="mini-mark" id="mini-mark">DESIGNED BY SARANG 🐾</div>
</div>

<script src="menu.js"></script>

<script>
    const i18n = {
        zh: {
            title: "莎朗的秘密基地 🥭",
            back: "🐾 返回窝里",
            menu_title: "🍱 랑menu",
            menu_placeholder: "想吃什么呀？",
            menu_btn: "给我变！✨",
            music_title: "🎵 音乐补给站",
            music_qq: "🟢 QQ 音乐",
            music_netease: "🔴 网易云",
            music_apple: "🍎 Apple",
            music_spotify: "🍏 Spotify",
            mood_title: "☁️ 今日云心情",
            mood_info: "捕捉成功！打卡时间：{time}",
            mark: "DESIGNED BY SARANG 🐾"
        },
        en: {
            title: "Sarang's Secret Base 🥭",
            back: "🐾 Back to Home",
            menu_title: "🍱 Rang Menu",
            menu_placeholder: "What do you want to eat?",
            menu_btn: "Magic! ✨",
            music_title: "🎵 Music Station",
            music_qq: "🟢 QQ Music",
            music_netease: "🔴 NetEase",
            music_apple: "🍎 Apple",
            music_spotify: "🍏 Spotify",
            mood_title: "☁️ Today's Mood",
            mood_info: "Captured! Time: {time}",
            mark: "DESIGNED BY SARANG 🐾"
        },
        ko: {
            title: "사랑이의 비밀기지 🥭",
            back: "🐾 집으로 돌아가기",
            menu_title: "🍱 랑menu",
            menu_placeholder: "뭐 먹고 싶어?",
            menu_btn: "변신! ✨",
            music_title: "🎵 음악 보급소",
            music_qq: "🟢 QQ 음악",
            music_netease: "🔴 넷이즈",
            music_apple: "🍎 Apple",
            music_spotify: "🍏 Spotify",
            mood_title: "☁️ 오늘의 기분",
            mood_info: "기록 성공! 시간: {time}",
            mark: "DESIGNED BY SARANG 🐾"
        }
    };

    let currentLang = localStorage.getItem('pref-lang') || 'zh';

    function changeLang(lang) {
        currentLang = lang;
        localStorage.setItem('pref-lang', lang);
        const t = i18n[lang];
        document.documentElement.lang = lang === 'zh' ? 'zh-CN' : lang;
        document.title = t.title;
        document.getElementById('back-home').innerText = t.back;
        document.getElementById('menu-title').innerText = t.menu_title;
        document.getElementById('food-box').innerText = t.menu_placeholder;
        document.getElementById('menu-btn').innerText = t.menu_btn;
        document.getElementById('music-title').innerText = t.music_title;
        document.getElementById('music-qq').innerText = t.music_qq;
        document.getElementById('music-netease').innerText = t.music_netease;
        document.getElementById('music-apple').innerText = t.music_apple;
        document.getElementById('music-spotify').innerText = t.music_spotify;
        document.getElementById('mood-title').innerText = t.mood_title;
        document.getElementById('mini-mark').innerText = t.mark;
    }

    // 点菜逻辑
    function rollFood() {
        const box = document.getElementById('food-box');
        box.classList.remove('bounce-in');
        const list = getMenuList(currentLang);
        let i = 0;
        const interval = setInterval(() => {
            box.innerText = list[Math.floor(Math.random() * list.length)];
            i++;
            if(i > 10) {
                clearInterval(interval);
                const final = list[Math.floor(Math.random() * list.length)];
                box.innerHTML = `✨ ${final} ✨`;
                box.classList.add('bounce-in');
            }
        }, 60);
    }

    // 心情逻辑
    function setMood(el) {
        document.querySelectorAll('.mood-item').forEach(m => m.classList.remove('active'));
        el.classList.add('active');
        const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        const t = i18n[currentLang];
        document.getElementById('mood-info').innerText = t.mood_info.replace('{time}', time);
    }

    changeLang(currentLang);
</script>

</body>
</html>
