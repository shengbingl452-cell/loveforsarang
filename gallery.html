        .back-btn {

        .upload-card {

        /* 照片墙网格 */
        .photo-wall {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        /* 拍立得样式 */
        .polaroid {
            background: #fff;
            padding: 10px 10px 20px 10px;
            border: 3px solid var(--main-brown);
            box-shadow: 5px 5px 0px rgba(122, 85, 55, 0.1);
            position: relative;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .polaroid::before {
            content: '';
            position: absolute;
            top: -12px; left: 50%;
            transform: translateX(-50%);
            width: 40px; height: 12px;
            background: rgba(255, 210, 77, 0.5);
            border: 1px solid rgba(0,0,0,0.1);
        }

        .polaroid img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border: 2px solid var(--main-brown);
        }

        .polaroid:nth-child(odd) { transform: rotate(-3deg); }
        .polaroid:nth-child(even) { transform: rotate(3deg); }

        .polaroid:hover {
            transform: rotate(0deg) scale(1.08);
            z-index: 10;
            box-shadow: 8px 8px 0px var(--accent-pink);
        }

        /* 全屏预览层 */
        #overlay {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        #overlay img { max-width: 90%; max-height: 85%; border: 5px solid white; border-radius: 10px; }

        .watermark { text-align: center; font-size: 10px; opacity: 0.3; margin-top: 50px; }
    </style>

    <div class="photo-wall">
        <?php
        $dir = "uploads/";
        if (is_dir($dir)) {
            // 获取所有图片文件，按修改时间倒序排列（最新的在前面）
            $images = glob($dir . "*.{jpg,jpeg,png,gif}", GLOB_BRACE);
            usort($images, function($a, $b) {
                return filemtime($b) - filemtime($a);
            });

            foreach ($images as $img) {
                echo '<div class="polaroid" onclick="zoomImg(this)">';
                echo '  <img src="' . $img . '" alt="照片">';
                echo '</div>';
            }
        }
        ?>
    </div>

    <div class="watermark">DESIGNED BY SARANG 🐾</div>
</div>

<div id="overlay" onclick="this.style.display='none'">
    <img id="fullImg" src="">
</div>

<script>
    // 上传逻辑
    document.getElementById('fileInput').onchange = async function() {
        const file = this.files[0];
        if (!file) return;

        const status = document.getElementById('status');
        status.innerText = "🚀 正在努力传送中...";

        const formData = new FormData();
        formData.append('photo', file);

        try {
            const response = await fetch('upload.php', {
                method: 'POST',
                body: formData
            });
            const result = await response.json();
            if (result.status === 'success') {
                status.innerText = "✅ 投稿成功啦！";
                setTimeout(() => location.reload(), 1000);
            } else {
                status.innerText = "❌ 失败了: " + result.message;
            }
        } catch (e) {
            status.innerText = "❌ 网络开小差了";
        }
    };

    // 放大逻辑
    function zoomImg(el) {
        const overlay = document.getElementById('overlay');
        const fullImg = document.getElementById('fullImg');
        fullImg.src = el.querySelector('img').src;
        overlay.style.display = 'flex';
    }
</script>

</body>
</html>
