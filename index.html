<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐾 莎朗的小狗窝</title>

<style>
/* 引入外部字体 */
@import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');

:root {
    --border-color: #7a5537;
    --main-bg: #fdf6e3;
    --accent-pink: #ff8fb1;
    --accent-yellow: #ffd24d;
    --bot-bubble: #fff9eb;
    --user-bubble: #e0f2fe;
}

/* 基础样式 */
body {
    background-color: #e9e4db;
    background-image: radial-gradient(#d1c9bc 1px, transparent 1px);
    background-size: 20px 20px;
    font-family: 'ZCOOL KuaiLe', "PingFang SC", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 0;
    padding: 20px;
    color: var(--border-color);
}

h1 { font-size: 32px; margin-bottom: 5px; text-shadow: 2px 2px 0px #fff; }
.subtitle { color: var(--accent-pink); margin-bottom: 20px; font-weight: bold; letter-spacing: 2px; }

/* 入口卡片 */
.entry-group { width: min(100%, 420px); }
.entry-card {
    display: block;
    margin-bottom: 20px;
    background: #fff;
    border: 4px solid var(--border-color);
    border-radius: 20px;
    padding: 15px;
    text-decoration: none;
    color: inherit;
    box-shadow: 6px 6px 0px var(--border-color);
    transition: all 0.2s ease;
}
.entry-card:hover { transform: translate(-2px, -2px); box-shadow: 8px 8px 0px var(--border-color); background: var(--bot-bubble); }
.entry-title { font-weight: bold; font-size: 18px; }
.entry-desc { font-size: 14px; opacity: 0.8; }

/* 聊天容器 */
.chat-container {
    width: min(100%, 420px);
    height: 60vh;
    background: #fff;
    border-radius: 30px;
    border: 4px solid var(--border-color);
    box-shadow: 10px 10px 0px rgba(122, 85, 55, 0.1);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
}

.status-bar { padding: 15px; background: var(--accent-yellow); border-bottom: 4px solid var(--border-color); font-weight: bold; }
.chat-box { flex: 1; padding: 20px; overflow-y: auto; background: #faf7f2; display: flex; flex-direction: column; }

/* 气泡样式 */
.message {
    padding: 12px 16px;
    border: 3px solid var(--border-color);
    border-radius: 18px;
    margin: 10px 0;
    max-width: 85%;
    font-size: 14px;
    line-height: 1.5;
    animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
@keyframes pop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
.bot { background: var(--bot-bubble); align-self: flex-start; border-bottom-left-radius: 4px; }
.user { background: var(--user-bubble); align-self: flex-end; border-bottom-right-radius: 4px; }

/* 输入区 */
.input-area { padding: 15px; background: #fff; border-top: 4px solid var(--border-color); display: flex; gap: 10px; }
#input { flex: 1; border: 3px solid var(--border-color); border-radius: 15px; padding: 10px; font-family: inherit; resize: none; }
.send { background: var(--accent-pink); color: white; border: 3px solid var(--border-color); border-radius: 15px; padding: 0 15px; cursor: pointer; font-family: inherit; font-weight: bold; }

/* 快捷按钮与日记 */
.quick { padding: 10px; display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; }
.quick button { background: #fff; border: 2px solid var(--border-color); border-radius: 10px; padding: 4px 10px; cursor: pointer; font-family: inherit; font-size: 12px; }
.diary-box { padding: 10px 15px; font-size: 13px; background: #fffbeb; border-top: 2px dashed #7a5537; }

/* --- 桌面宠物样式 --- */
#pet-wrapper {
    position: fixed;
    bottom: 90px;
    right: 20px;
    z-index: 999;
    display: flex;
    flex-direction: column;
    align-items: center;
    pointer-events: none;
}
#pet-container { pointer-events: auto; cursor: pointer; transition: transform 0.3s; }
#pet-img { width: 110px; filter: drop-shadow(3px 3px 0px rgba(0,0,0,0.1)); }
.pet-bubble {
    background: white;
    border: 3px solid var(--border-color);
    border-radius: 15px;
    padding: 6px 12px;
    margin-bottom: 8px;
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.3s;
    white-space: nowrap;
}
.float-ani { animation: float 3s ease-in-out infinite; }
@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }

#snack {
    position: fixed;
    right: 25px;
    bottom: 25px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: 4px solid var(--border-color);
    background: var(--accent-yellow);
    font-size: 28px;
    cursor: pointer;
    box-shadow: 4px 4px 0px var(--border-color);
    z-index: 1000;
}
#snack:active { transform: scale(0.9); box-shadow: 0px 0px 0px; }

.mini-watermark {
    position: fixed;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    color: #7a5537;
    opacity: 0.2;
    pointer-events: none;
    user-select: none;
}
</style>
</head>

<body>

<h1>🐾 莎朗的小狗窝 🥭</h1>
<div class="subtitle">RYU SARANG</div>

<div class="entry-group">
    <a class="entry-card" href="body.html">
        <div class="entry-title">🧸 秘密天地</div>
        <div class="entry-desc">去看看我的歌单和点菜机！</div>
    </a>
</div>

<div class="chat-container">
    <div class="status-bar">
        🐶 Sarang 正在想你...
        <button id="clearBtn" style="float:right; font-size:12px; border-radius:8px; border:2px solid #7a5537; background:#fff; cursor:pointer; padding:2px 8px;">清空</button>
    </div>

    <div class="chat-box" id="chat">
        <div class="message bot">汪！我是 Sarang 🐾 <br>欢迎来到我的秘密小窝！</div>
    </div>

    <div class="quick">
        <button onclick="ask('今天开心吗？')">😊 开心吗</button>
        <button onclick="ask('给我讲个故事')">📖 讲故事</button>
        <button onclick="ask('推荐一首歌')">🎵 听歌</button>
    </div>

    <div class="diary-box">
        📖 <b>莎朗的小日记：</b> <span id="diary">加载中...</span>
    </div>

    <div class="input-area">
        <textarea id="input" placeholder="和 Sarang 聊聊吧..." rows="1"></textarea>
        <button class="send" onclick="send()">发送</button>
    </div>
</div>

<div id="pet-wrapper">
    <div id="pet-speech" class="pet-bubble">摸摸我~</div>
    <div id="pet-container" class="float-ani">
        <img id="pet-img" src="assets/pet-idle.png" alt="Sarang">
    </div>
</div>

<button id="snack" title="喂食饼干">🍪</button>

<div class="mini-watermark">allforsarang ---特别致谢onlysarangu🐾</div>

<script>
// --- 原有逻辑：日记与聊天 ---
const diaryList = ["今天的天空很好看。", "如果可以的话，我想去海边。", "芒果真的很像夏天。", "聊天也是一种旅行。", "秋天是不是有芒果味？"];
document.getElementById("diary").innerText = diaryList[Math.floor(Math.random() * diaryList.length)];

const STORAGE_KEY = 'sarang-chat-history';
const chatEl = document.getElementById("chat");
const inputEl = document.getElementById("input");
const sendBtn = document.querySelector(".send");

function scrollToBottom() { chatEl.scrollTop = chatEl.scrollHeight; }

function saveHistory() {
    const msgs = Array.from(chatEl.querySelectorAll(".message")).map(el => ({
        role: el.classList.contains("user") ? "user" : "bot",
        text: el.innerText
    }));
    localStorage.setItem(STORAGE_KEY, JSON.stringify(msgs));
}

function loadHistory() {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    try {
        const messages = JSON.parse(raw);
        chatEl.innerHTML = "";
        messages.forEach(msg => {
            const div = document.createElement("div");
            div.className = "message " + msg.role;
            div.innerText = msg.text;
            chatEl.appendChild(div);
        });
        scrollToBottom();
    } catch (e) { console.error(e); }
}

async function send() {
    let text = inputEl.value.trim();
    if (!text || sendBtn.disabled) return;

    appendMsg("user", text);
    inputEl.value = "";
    scrollToBottom();

    sendBtn.disabled = true;
    try {
        let res = await fetch("api.php", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: text })
        });
        let data = await res.json();
        appendMsg("bot", data.reply || "Sarang 好像在发呆...");
    } catch (err) {
        appendMsg("bot", "Sarang 跑去接电话了，请稍后再试。");
    }
    sendBtn.disabled = false;
    saveHistory();
    scrollToBottom();
}

function appendMsg(role, text) {
    const div = document.createElement("div");
    div.className = "message " + role;
    div.innerText = text;
    chatEl.appendChild(div);
}

function ask(text) { inputEl.value = text; inputEl.focus(); }

document.getElementById("clearBtn").onclick = () => {
    chatEl.innerHTML = '<div class="message bot">记录已清空 🐾</div>';
    saveHistory();
};

inputEl.onkeydown = (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } };

loadHistory();

// --- 新增逻辑：桌面宠物交互 ---
const petImg = document.getElementById('pet-img');
const petSpeech = document.getElementById('pet-speech');
const petContainer = document.getElementById('pet-container');
const snackBtn = document.getElementById('snack');

// 预加载吃东西图片
new Image().src = 'assets/pet-eat.png';

function sarangTalk(text) {
    petSpeech.innerText = text;
    petSpeech.style.opacity = '1';
    setTimeout(() => { petSpeech.style.opacity = '0'; }, 3000);
}

petContainer.onclick = () => {
    const lines = ["汪！好舒服~", "是在摸我吗？✨", "嘿嘿，莎朗最喜欢你了！"];
    sarangTalk(lines[Math.floor(Math.random() * lines.length)]);
    petContainer.style.transform = "scale(1.2)";
    setTimeout(() => { petContainer.style.transform = "scale(1)"; }, 200);
};

snackBtn.onclick = () => {
    petImg.src = 'assets/pet-eat.png';
    sarangTalk("吧唧吧唧... 谢谢你的饼干！🍪");
    
    // 进食动画：暂时停止呼吸动画，执行跳跃
    petContainer.classList.remove('float-ani');
    petContainer.style.transform = "translateY(-30px) scale(1.1)";
    
    setTimeout(() => {
        petImg.src = 'assets/pet-idle.png';
        petContainer.style.transform = "translateY(0) scale(1)";
        petContainer.classList.add('float-ani');
    }, 5000);
};
</script>
</body>
</html>
