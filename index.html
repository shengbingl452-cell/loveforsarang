<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SarangPuppyHome 🐶🥭</title>
    <style>
        :root { --mango: #FFD93D; --pink: #FF87B2; --brown: #8B5E3C; }
        body { background: #FFFBF2; color: var(--brown); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; overflow-x: hidden; }
        
        /* 芒果掉落特效 */
        .mango-drop { position: fixed; top: -50px; font-size: 24px; animation: drop linear forwards; pointer-events: none; z-index: 1; }
        @keyframes drop { to { transform: translateY(110vh) rotate(360deg); } }

        .chat-container { width: 90%; max-width: 400px; background: white; border: 4px solid var(--brown); border-radius: 30px; padding: 20px; box-shadow: 0 10px 0px #F0E5D0; z-index: 2; margin-top: 40px; }
        #box { height: 350px; overflow-y: auto; background: #FFF9E7; border-radius: 20px; padding: 15px; border: 2px dashed var(--mango); margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 15px; font-size: 14px; max-width: 80%; line-height: 1.5; }
        .ai { background: #fff; border: 1px solid var(--mango); align-self: flex-start; }
        .user { background: var(--pink); color: white; align-self: flex-end; }

        .input-row { display: flex; gap: 8px; }
        input { flex: 1; border: 2px solid var(--brown); border-radius: 20px; padding: 12px; outline: none; }
        button { background: var(--mango); border: 2px solid var(--brown); border-radius: 20px; padding: 10px 20px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 0 var(--brown); }
        button:active { transform: translateY(4px); box-shadow: none; }
    </style>
</head>
<body>
    <h1 style="margin-top: 30px; font-size: 1.8rem;">🐾 莎朗的小狗窝 🥭</h1>
    <div class="chat-container">
        <div id="box"><div class="msg ai">汪！今天也想吃芒果吗？汪汪！🥭</div></div>
        <div class="input-row">
            <input type="text" id="in" placeholder="和莎朗聊天...">
            <button onclick="send()">发送</button>
        </div>
    </div>

    <script>
        // 随机掉落芒果
        setInterval(() => {
            const m = document.createElement('div');
            m.className = 'mango-drop';
            m.innerText = '🥭';
            m.style.left = Math.random() * 100 + 'vw';
            m.style.animationDuration = (Math.random() * 3 + 2) + 's';
            document.body.appendChild(m);
            setTimeout(() => m.remove(), 5000);
        }, 1000);

        async function send() {
            const input = document.getElementById('in');
            const box = document.getElementById('box');
            const val = input.value.trim();
            if(!val) return;

            box.innerHTML += `<div class="msg user">${val}</div>`;
            input.value = '';
            box.scrollTop = box.scrollHeight;

            const tip = document.createElement('div');
            tip.className = 'msg ai'; tip.innerText = '小狗正在思考... 🐾';
            box.appendChild(tip);

            try {
                const res = await fetch('api.php', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: val})
                });
                const data = await res.json();
                tip.innerText = data.response;
            } catch(e) {
                tip.innerText = "汪呜，网络好像坏掉了。";
            }
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
