<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐾 莎朗的小狗窝</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');

:root {
    --border-color: #7a5537;
    --main-bg: #fdf6e3;
    --accent-pink: #ff8fb1;
    --accent-yellow: #ffd24d;
    --bot-bubble: #fff9eb;
    --user-bubble: #e0f2fe;
}

body {
    background-color: #e9e4db;
    background-image: radial-gradient(#d1c9bc 1px, transparent 1px);
    background-size: 20px 20px;
    font-family: 'ZCOOL KuaiLe', "PingFang SC", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 0;
    padding: 20px;
    color: var(--border-color);
}

h1 { font-size: 32px; margin-bottom: 5px; text-shadow: 2px 2px 0px #fff; }
.subtitle { color: var(--accent-pink); margin-bottom: 20px; font-weight: bold; letter-spacing: 2px; }

/* 入口卡片 */
.entry-group { width: min(100%, 420px); }
.entry-card {
    display: block; margin-bottom: 15px; background: #fff; border: 4px solid var(--border-color);
    border-radius: 20px; padding: 15px; text-decoration: none; color: inherit;
    box-shadow: 6px 6px 0px var(--border-color); transition: all 0.2s ease; position: relative;
}
.entry-card:hover { transform: translate(-2px, -2px); box-shadow: 8px 8px 0px var(--border-color); background: var(--bot-bubble); }
.mini-photo-deco { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); font-size: 24px; opacity: 0.3; }

/* 聊天窗口 */
.chat-container {
    width: min(100%, 420px); height: 50vh; background: #fff; border-radius: 30px;
    border: 4px solid var(--border-color); box-shadow: 10px 10px 0px rgba(122, 85, 55, 0.1);
    display: flex; flex-direction: column; overflow: hidden; position: relative;
}
.status-bar { padding: 12px; background: var(--accent-yellow); border-bottom: 4px solid var(--border-color); font-weight: bold; }
.chat-box { flex: 1; padding: 15px; overflow-y: auto; background: #faf7f2; display: flex; flex-direction: column; }
.message { padding: 10px 14px; border: 3px solid var(--border-color); border-radius: 18px; margin: 8px 0; max-width: 85%; font-size: 14px; animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
@keyframes pop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
.bot { background: var(--bot-bubble); align-self: flex-start; border-bottom-left-radius: 4px; }
.user { background: var(--user-bubble); align-self: flex-end; border-bottom-right-radius: 4px; }

.input-area { padding: 12px; background: #fff; border-top: 4px solid var(--border-color); display: flex; gap: 8px; }
#input { flex: 1; border: 3px solid var(--border-color); border-radius: 12px; padding: 8px; font-family: inherit; resize: none; outline: none; }
.send { background: var(--accent-pink); color: white; border: 3px solid var(--border-color); border-radius: 12px; padding: 0 12px; cursor: pointer; font-weight: bold; }

/* ------------------------------------------------ */
/* ✨ 桌面宠物专属样式 */
#pet-wrapper { position: fixed; bottom: 90px; right: 20px; z-index: 999; display: flex; flex-direction: column; align-items: center; pointer-events: none; }
#pet-container { pointer-events: auto; cursor: pointer; transition: transform 0.3s; }
#pet-img { width: 100px; transition: opacity 0.3s, filter 0.3s; }
.pet-bubble { background: white; border: 3px solid var(--border-color); border-radius: 15px; padding: 5px 10px; margin-bottom: 5px; font-size: 12px; opacity: 0; transition: opacity 0.3s; white-space: nowrap; }

/* 动画库 */
.float-ani { animation: float 3s ease-in-out infinite; }
@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

.sleep-ani { animation: sleep 4s ease-in-out infinite; filter: sepia(20%) brightness(0.8); }
@keyframes sleep { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(0.96); opacity: 0.6; } }

.listen-ani { animation: listen 0.5s ease-in-out infinite; }
@keyframes listen { 0%, 100% { transform: rotate(-3deg); } 50% { transform: rotate(3deg); } }

.chewing { animation: chew 0.5s ease-in-out infinite; }
@keyframes chew { 0%, 100% { transform: translateY(-20px) scale(1.1); } 50% { transform: translateY(-25px) scale(1.15) rotate(2deg); } }

#snack { position: fixed; right: 25px; bottom: 25px; width: 60px; height: 60px; border-radius: 50%; border: 4px solid var(--border-color); background: var(--accent-yellow); font-size: 28px; cursor: pointer; box-shadow: 4px 4px 0px var(--border-color); z-index: 1000; transition: 0.2s; }
#snack:active { transform: scale(0.9); box-shadow: 0px 0px 0px; }

.mini-watermark { position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%); font-size: 11px; color: #7a5537; opacity: 0.2; pointer-events: none; }
</style>
</head>

<body>

<h1>🐾 莎朗的小狗窝 🥭</h1>
<div class="subtitle">RYU SARANG</div>

<div class="entry-group">
    <a class="entry-card" href="body.html">
        <div class="entry-title">🧸 秘密天地</div>
        <div class="entry-desc">去看看我的歌单和点菜机！</div>
    </a>
    <a class="entry-card" href="gallery.php">
        <div class="entry-title">📸 瞬间记录</div>
        <div class="entry-desc">这里存着莎朗亮晶晶的回忆~</div>
        <div class="mini-photo-deco">🖼️</div>
    </a>
</div>

<div class="chat-container">
    <div class="status-bar">🐶 Sarang 正在想你... <button id="clearBtn" style="float:right; font-size:11px; border-radius:8px; border:2px solid #7a5537; background:#fff; cursor:pointer;">清空</button></div>
    <div class="chat-box" id="chat"><div class="message bot">汪！我是 Sarang 🐾 <br>欢迎来到我的秘密小窝！</div></div>
    <div class="input-area">
        <textarea id="input" placeholder="和 Sarang 聊聊吧..." rows="1"></textarea>
        <button class="send" onclick="send()">发送</button>
    </div>
</div>

<div id="pet-wrapper">
    <div id="pet-speech" class="pet-bubble">Zzz...</div>
    <div id="pet-container" class="float-ani">
        <img id="pet-img" src="assets/pet-idle.png" alt="Sarang">
    </div>
</div>

<button id="snack">🍪</button>
<div class="mini-watermark">allforsarang ---特别致谢onlysarangu🐾</div>

<script>
// --- 核心配置 ---
const IDLE_SRC = 'assets/pet-idle.png';
const EAT_SRC = 'assets/pet-eat.png';
const SLEEP_SRC = 'assets/pet-sleep.png';

const chatEl = document.getElementById("chat");
const inputEl = document.getElementById("input");
const petImg = document.getElementById('pet-img');
const petSpeech = document.getElementById('pet-speech');
const petContainer = document.getElementById('pet-container');

let idleTimer;

// 预加载
[IDLE_SRC, EAT_SRC, SLEEP_SRC].forEach(src => { new Image().src = src; });

// --- 宠物逻辑 ---
function sarangTalk(text, persist = false) {
    petSpeech.innerText = text;
    petSpeech.style.opacity = '1';
    if (!persist) setTimeout(() => { petSpeech.style.opacity = '0'; }, 3000);
}

function wakeUp() {
    clearTimeout(idleTimer);
    if (petContainer.classList.contains('sleep-ani')) {
        petContainer.classList.remove('sleep-ani');
        petContainer.classList.add('float-ani');
        petImg.src = IDLE_SRC;
        petSpeech.style.opacity = '0';
    }
    startIdleTimer();
}

function goToSleep() {
    if (petContainer.classList.contains('chewing') || inputEl.value.length > 0) return;
    petContainer.classList.remove('float-ani', 'listen-ani');
    petContainer.classList.add('sleep-ani');
    petImg.src = SLEEP_SRC;
    sarangTalk("Zzz... 呼...", true);
}

function startIdleTimer() {
    clearTimeout(idleTimer);
    idleTimer = setTimeout(goToSleep, 15000); // 15秒无操作睡觉
}

// --- 交互事件 ---
inputEl.addEventListener('input', () => {
    wakeUp();
    if (inputEl.value.length > 0) {
        petContainer.classList.remove('float-ani');
        petContainer.classList.add('listen-ani');
        sarangTalk("嗯嗯，在听呢...", true);
    } else {
        petContainer.classList.remove('listen-ani');
        petContainer.classList.add('float-ani');
        petSpeech.style.opacity = '0';
    }
});

petContainer.onclick = () => {
    wakeUp();
    const lines = ["汪！好舒服~", "摸摸头，真开心✨", "莎朗最喜欢你了！"];
    sarangTalk(lines[Math.floor(Math.random() * lines.length)]);
    petContainer.style.transform = "scale(1.2)";
    setTimeout(() => { petContainer.style.transform = "scale(1)"; }, 200);
};

document.getElementById('snack').onclick = () => {
    wakeUp();
    petImg.src = EAT_SRC;
    sarangTalk("吧唧吧唧... 超级好吃！🍪");
    petContainer.classList.remove('float-ani', 'sleep-ani', 'listen-ani');
    petContainer.classList.add('chewing');
    setTimeout(() => {
        petImg.src = IDLE_SRC;
        petContainer.classList.remove('chewing');
        petContainer.classList.add('float-ani');
    }, 3000); 
};

// --- 聊天逻辑 ---
async function send() {
    let text = inputEl.value.trim();
    if (!text) return;
    appendMsg("user", text);
    inputEl.value = "";
    petContainer.classList.remove('listen-ani');
    petContainer.classList.add('float-ani');
    
    try {
        let res = await fetch("api.php", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ message: text }) });
        let data = await res.json();
        appendMsg("bot", data.reply || "Sarang在发呆...");
    } catch (err) { appendMsg("bot", "Sarang跑远了..."); }
    startIdleTimer();
}

function appendMsg(role, text) {
    const div = document.createElement("div");
    div.className = "message " + role;
    div.innerText = text;
    chatEl.appendChild(div);
    chatEl.scrollTop = chatEl.scrollHeight;
}

document.getElementById("clearBtn").onclick = () => { chatEl.innerHTML = ""; };
inputEl.onkeydown = (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } };

// 初始化
startIdleTimer();
</script>
</body>
</html>
