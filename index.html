<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>莎朗的小狗窝</title>

<style>
/* 引入可爱风字体 */
@import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');
.mini-watermark {
    position: fixed;
    bottom: 10px;        /* 距离底部 10px */
    right: 15px;         /* 距离右侧 15px */
    font-size: 10px;     /* 字号设置得很小 */
    color: #7a5537;      /* 使用你全局的棕色调 */
    opacity: 0.3;        /* 关键：设置 30% 的透明度，若隐若现 */
    pointer-events: none; /* 确保水印不影响鼠标点击下层内容 */
    letter-spacing: 1px;
    font-family: sans-serif; /* 使用系统简洁字体增强可读性 */
    user-select: none;   /* 防止用户误选文字 */
    z-index: 9999;       /* 确保在最顶层 */
}
:root {
    --border-color: #7a5537;
    --main-bg: #fdf6e3;
    --accent-pink: #ff8fb1;
    --accent-yellow: #ffd24d;
    --bot-bubble: #fff9eb;
    --user-bubble: #e0f2fe;
}

body {
    background-color: #e9e4db;
    background-image: radial-gradient(#d1c9bc 1px, transparent 1px);
    background-size: 20px 20px; /* 复古波点背景 */
    font-family: 'ZCOOL KuaiLe', "PingFang SC", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 0;
    padding: 20px;
    color: var(--border-color);
}

h1 {
    font-size: 32px;
    margin-bottom: 5px;
    text-shadow: 2px 2px 0px #fff;
}

.subtitle {
    color: var(--accent-pink);
    margin-bottom: 20px;
    font-weight: bold;
    letter-spacing: 2px;
}

/* 入口卡片美化 */
.entry-card {
    display: block;
    width: min(100%, 420px);
    margin-bottom: 20px;
    background: #fff;
    border: 4px solid var(--border-color);
    border-radius: 20px;
    padding: 15px;
    text-decoration: none;
    color: inherit;
    box-shadow: 6px 6px 0px var(--border-color);
    transition: all 0.2s ease;
    box-sizing: border-box;
}

.entry-card:hover {
    transform: translate(-2px, -2px);
    box-shadow: 8px 8px 0px var(--border-color);
    background: var(--bot-bubble);
}

/* 聊天容器美化 */
.chat-container {
    width: min(100%, 420px);
    height: 70vh;
    background: #fff;
    border-radius: 30px;
    border: 4px solid var(--border-color);
    box-shadow: 10px 10px 0px rgba(122, 85, 55, 0.1);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
}

.status-bar {
    padding: 15px;
    background: var(--accent-yellow);
    border-bottom: 4px solid var(--border-color);
    font-weight: bold;
}

.chat-box {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
    background: #faf7f2;
}

/* 聊天气泡动画 */
.message {
    padding: 12px 16px;
    border: 3px solid var(--border-color);
    border-radius: 18px;
    margin: 10px 0;
    max-width: 80%;
    font-size: 14px;
    line-height: 1.5;
    position: relative;
    animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

@keyframes pop {
    0% { transform: scale(0.8); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
}

.bot {
    background: var(--bot-bubble);
    align-self: flex-start;
    border-bottom-left-radius: 4px;
}

.user {
    background: var(--user-bubble);
    margin-left: auto;
    border-bottom-right-radius: 4px;
}

/* 输入区域美化 */
.input-area {
    padding: 15px;
    background: #fff;
    border-top: 4px solid var(--border-color);
    display: flex;
    gap: 10px;
}

#input {
    border: 3px solid var(--border-color);
    border-radius: 15px;
    padding: 10px 15px;
    background: #fdf6e3;
}

.send {
    background: var(--accent-pink);
    color: white;
    border: 3px solid var(--border-color);
    border-radius: 15px;
    box-shadow: 3px 3px 0px var(--border-color);
    cursor: pointer;
    transition: 0.1s;
}

.send:active {
    transform: translate(2px, 2px);
    box-shadow: 0px 0px 0px var(--border-color);
}

/* 快捷按钮 */
.quick button {
    background: #fff;
    border: 2px solid var(--border-color);
    border-radius: 12px;
    padding: 5px 12px;
    font-family: inherit;
    transition: all 0.2s;
}

.quick button:hover {
    background: var(--accent-yellow);
    transform: scale(1.05);
}

/* 🍪 饼干按钮 */
#snack {
    position: fixed;
    right: 20px;
    bottom: 20px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: 4px solid var(--border-color);
    background: var(--accent-yellow);
    font-size: 28px;
    cursor: pointer;
    box-shadow: 4px 4px 0px var(--border-color);
    transition: 0.2s;
}

#snack:hover { transform: rotate(15deg) scale(1.1); }
#snack:active { transform: scale(0.9); }

</style>
</head>

<body>

<h1>🐾 莎朗的小狗窝 🥭</h1>
<div class="subtitle">RYU SARANG</div>

<a class="entry-card" href="body.html">
    <div class="entry-title">🧸 进入莎朗的小天地</div>
    <div class="entry-desc">去看看我的收藏歌单和心情记录吧！✨</div>
</a>

<div class="chat-container">
    <div class="status-bar">
        🐶 Sarang 正在想你...
        <button id="clearBtn" class="clear" style="float:right; border-radius:10px; border:2px solid #7a5537; background:#fff; cursor:pointer;">清空</button>
    </div>

    <div class="chat-box" id="chat">
        <div class="message bot">
            汪！我是 Sarang 🐾 <br>欢迎来到我的秘密小窝！在这里我们可以聊聊梦想，或者随便发发呆。
        </div>
    </div>

    <div class="quick">
        <button onclick="ask('今天开心吗？')">😊 开心吗</button>
        <button onclick="ask('给我讲个故事')">📖 讲故事</button>
        <button onclick="ask('推荐一首歌')">🎵 听歌</button>
    </div>

    <div class="diary">
        <div style="padding: 10px 15px; font-size: 13px; background: #fffbeb; border-top: 2px dashed #7a5537;">
            📖 <b>莎朗的小日记：</b> <span id="diary">加载中...</span>
        </div>
    </div>

    <div class="input-area">
        <textarea id="input" placeholder="和 Sarang 聊聊吧..." rows="1"></textarea>
        <button class="send" onclick="send()">发送</button>
    </div>
</div>

<footer>
    🐾 一个可以聊天、发呆、做梦的小地方
</footer>

<script>
if (location.protocol === 'file:') {
  alert('注意：请通过 HTTP 服务（例如 python -m http.server）打开页面，否则无法调用后端接口发送消息。');
}

/* 日记 */
const diary = [
  "今天的天空很好看。",
  "如果可以的话，我想去海边。",
  "芒果真的很像夏天。",
  "聊天也是一种旅行。",
  "秋天是不是有芒果味？"
];

document.getElementById("diary").innerText =
  diary[Math.floor(Math.random() * diary.length)];

/* 本地存储（简单会话记忆） */
const STORAGE_KEY = 'sarang-chat-history';
const inputEl = document.getElementById("input");
const chatEl = document.getElementById("chat");
const defaultIntroHTML = chatEl.innerHTML;
const sendBtn = document.querySelector("button.send");
const clearBtn = document.getElementById("clearBtn");

function scrollToBottom(){
  chatEl.scrollTop = chatEl.scrollHeight;
}

function saveHistory(){
  const messages = Array.from(chatEl.querySelectorAll(".message")).map(el => ({
    role: el.classList.contains("user") ? "user" : "bot",
    text: el.innerText
  }));
  localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
}

function loadHistory(){
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) return;

  try {
    const messages = JSON.parse(raw);
    if (!Array.isArray(messages) || messages.length === 0) return;

    chatEl.innerHTML = "";
    for (const msg of messages) {
      const div = document.createElement("div");
      div.className = "message " + (msg.role === "user" ? "user" : "bot");
      div.innerText = msg.text;
      chatEl.appendChild(div);
    }
    scrollToBottom();
  } catch (e) {
    console.warn("加载聊天记录失败", e);
  }
}

function setLoading(loading){
  sendBtn.disabled = loading;
  inputEl.disabled = loading;
  sendBtn.innerText = loading ? "发送中..." : "发送";
}

function ask(text){
  inputEl.value = text;
  inputEl.focus();
}

function clearChat(){
  chatEl.innerHTML = defaultIntroHTML;
  saveHistory();
  scrollToBottom();
}

clearBtn.addEventListener("click", clearChat);

inputEl.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

loadHistory();

async function send(){
  if (sendBtn.disabled) return;

  let text = inputEl.value.trim();
  if(!text) return;

  let user = document.createElement("div");
  user.className="message user";
  user.innerText=text;
  chatEl.appendChild(user);

  inputEl.value="";
  scrollToBottom();

  let typing = document.createElement("div");
  typing.className="message bot typing";
  typing.innerText = "";
  chatEl.appendChild(typing);
  scrollToBottom();

  setLoading(true);

  let data;
  try {
    let res = await fetch("api.php",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({message:text})
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || `HTTP ${res.status}`);
    }

    data = await res.json();
  } catch (err) {
    data = { reply: `sarang 出状况了：${err.message}` };
  }

  typing.remove();

  let bot = document.createElement("div");
  bot.className="message bot";
  bot.innerText=data.reply || "sarang好像在发呆...";
  chatEl.appendChild(bot);

  scrollToBottom();
  saveHistory();
  setLoading(false);
}
</script>

<button id="snack">🍪</button>

<script>
  document.getElementById('snack').addEventListener('click', () => {
    alert('sarang：谢谢你的小零食！🐶');
  });
</script>
<div class="mini-watermark">
    allforsarang ---特别致谢onlysarangu🐾
</div>
</body>
</html>
