<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐾 莎朗的小狗窝</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');

:root {
    --border-color: #7a5537;
    --main-bg: #fdf6e3;
    --accent-pink: #ff8fb1;
    --accent-yellow: #ffd24d;
    --bot-bubble: #fff9eb;
    --user-bubble: #e0f2fe;
}

body {
    background-color: #e9e4db;
    background-image: radial-gradient(#d1c9bc 1px, transparent 1px);
    background-size: 20px 20px;
    font-family: 'ZCOOL KuaiLe', "PingFang SC", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 0;
    padding: 20px;
    color: var(--border-color);
}

h1 { font-size: 32px; margin-bottom: 5px; text-shadow: 2px 2px 0px #fff; }
.subtitle { color: var(--accent-pink); margin-bottom: 15px; font-weight: bold; letter-spacing: 2px; }

/* 语言切换按钮 */
.lang-switch { margin-bottom: 15px; display: flex; gap: 8px; }
.lang-switch button {
    background: #fff; border: 2px solid var(--border-color); border-radius: 8px;
    padding: 4px 12px; cursor: pointer; font-family: inherit; font-size: 12px;
    transition: 0.2s;
}
.lang-switch button:hover { background: var(--accent-yellow); }

/* 入口卡片 */
.entry-group { width: min(100%, 420px); }
.entry-card {
    display: block; margin-bottom: 15px; background: #fff; border: 4px solid var(--border-color);
    border-radius: 20px; padding: 15px; text-decoration: none; color: inherit;
    box-shadow: 6px 6px 0px var(--border-color); transition: all 0.2s ease; position: relative;
}
.entry-card:hover { transform: translate(-2px, -2px); box-shadow: 8px 8px 0px var(--border-color); background: var(--bot-bubble); }
.mini-photo-deco { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); font-size: 24px; opacity: 0.3; }

/* 聊天容器 */
.chat-container {
    width: min(100%, 420px); height: 45vh; background: #fff; border-radius: 30px;
    border: 4px solid var(--border-color); box-shadow: 10px 10px 0px rgba(122, 85, 55, 0.1);
    display: flex; flex-direction: column; overflow: hidden; position: relative;
}
.status-bar { padding: 12px; background: var(--accent-yellow); border-bottom: 4px solid var(--border-color); font-weight: bold; }
.chat-box { flex: 1; padding: 15px; overflow-y: auto; background: #faf7f2; display: flex; flex-direction: column; }
.message { padding: 10px 14px; border: 3px solid var(--border-color); border-radius: 18px; margin: 8px 0; max-width: 85%; font-size: 14px; animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
@keyframes pop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
.bot { background: var(--bot-bubble); align-self: flex-start; border-bottom-left-radius: 4px; }
.user { background: var(--user-bubble); align-self: flex-end; border-bottom-right-radius: 4px; }

.diary-box { padding: 10px 15px; font-size: 12px; background: #fffbeb; border-top: 2px dashed #7a5537; width: min(100%, 390px); margin-bottom: 10px; border-radius: 10px; }

.input-area { padding: 12px; background: #fff; border-top: 4px solid var(--border-color); display: flex; gap: 8px; }
#input { flex: 1; border: 3px solid var(--border-color); border-radius: 12px; padding: 8px; font-family: inherit; resize: none; outline: none; }
.send { background: var(--accent-pink); color: white; border: 3px solid var(--border-color); border-radius: 12px; padding: 0 12px; cursor: pointer; font-weight: bold; }

/* 桌面宠物 */
#pet-wrapper { position: fixed; bottom: 90px; right: 20px; z-index: 999; display: flex; flex-direction: column; align-items: center; pointer-events: none; }
#pet-container { pointer-events: auto; cursor: pointer; transition: transform 0.3s; position: relative; touch-action: none; }
/* 气泡跟随宠物位置 */
.pet-bubble {
    background: white;
    border: 3px solid var(--border-color);
    border-radius: 15px;
    padding: 5px 10px;
    margin-bottom: 15px;
    font-size: 12px;
    opacity: 0;
    transition: opacity 0.3s;
    white-space: nowrap;
    pointer-events: none;
    position: absolute;
    bottom: 110px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
}

/* 确保容器内的图片层级较低 */
#pet-img {
    width: 100px;
    transition: opacity 0.3s;
    position: relative;
    z-index: 5;
}

.float-ani { animation: float 3s ease-in-out infinite; }
@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

.sleep-ani { animation: sleep 4s ease-in-out infinite; filter: sepia(20%) brightness(0.8); }
@keyframes sleep { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(0.96); opacity: 0.6; } }

.listen-ani { animation: listen 0.5s ease-in-out infinite; }
@keyframes listen { 0%, 100% { transform: rotate(-3deg); } 50% { transform: rotate(3deg); } }

.chewing { animation: chew 0.5s ease-in-out infinite; }
@keyframes chew { 0%, 100% { transform: translateY(-20px) scale(1.1); } 50% { transform: translateY(-25px) scale(1.15) rotate(2deg); } }

#snack { position: fixed; right: 25px; bottom: 25px; width: 60px; height: 60px; border-radius: 50%; border: 4px solid var(--border-color); background: var(--accent-yellow); font-size: 28px; cursor: pointer; box-shadow: 4px 4px 0px var(--border-color); z-index: 1000; }
.bgm-toggle { position: fixed; left: 20px; bottom: 25px; height: 46px; min-width: 90px; padding: 0 12px; border-radius: 23px; border: 3px solid var(--border-color); background: #fff; font-size: 13px; cursor: pointer; box-shadow: 3px 3px 0px var(--border-color); z-index: 1000; }
.bgm-toggle.playing { background: var(--accent-pink); color: #fff; }

.mini-watermark { position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%); font-size: 11px; color: #7a5537; opacity: 0.2; pointer-events: none; }

@media (max-width: 480px) {
    #pet-wrapper { bottom: 140px; right: 12px; }
}
</style>
</head>

<body>

<h1 id="main-title">🐾 莎朗的小狗窝 🥭</h1>
<div class="subtitle" id="main-subtitle">RYU SARANG</div>

<div class="lang-switch">
    <button onclick="changeLang('en')">English</button>
    <button onclick="changeLang('ko')">한국어</button>
    <button onclick="changeLang('zh')">中文</button>
</div>

<div class="entry-group">
    <a class="entry-card" href="body.html">
        <div class="entry-title" id="entry1-t">🧸 秘密天地</div>
        <div class="entry-desc" id="entry1-d">去看看我的歌单和点菜机！</div>
    </a>
    <a class="entry-card" href="gallery.php">
        <div class="entry-title" id="entry2-t">📸 瞬间记录</div>
        <div class="entry-desc" id="entry2-d">这里存着莎朗亮晶晶的回忆~</div>
        <div class="mini-photo-deco">🖼️</div>
    </a>
</div>

<div class="chat-container">
    <div class="status-bar"><span id="status-txt">🐶 Sarang 正在想你...</span> <button id="clearBtn" style="float:right; font-size:11px; border-radius:8px; border:2px solid #7a5537; background:#fff; cursor:pointer;">清空</button></div>
    <div class="chat-box" id="chat"></div>
    <div class="input-area">
        <textarea id="input" rows="1"></textarea>
        <button class="send" onclick="send()">发送</button>
    </div>
</div>

<div class="diary-box">📖 <b id="diary-label">莎朗的小日记：</b> <span id="diary">...</span></div>

<div id="pet-wrapper">
    <div id="pet-container" class="float-ani">
        <div id="pet-speech" class="pet-bubble">Zzz...</div>
        <img id="pet-img" src="assets/pet-idle.png" alt="Sarang">
    </div>
</div>

<button id="snack">🍪</button>
<button id="bgm-toggle" class="bgm-toggle" aria-label="Toggle background music">播放 ▶️</button>
<div class="mini-watermark">allforsarang ---特别致谢onlysarangu🐾</div>
<audio id="bgm" src="assets/bgm.mp3" loop></audio>
<audio id="love-sfx" src="assets/love.mp3" preload="auto"></audio>
<audio id="miss-sfx" src="assets/miss.mp3" preload="auto"></audio>

<script>
// --- 语言包 ---
const i18n = {
    'zh': {
        title: "🐾 莎朗的小狗窝 🥭",
        subtitle: "RYU SARANG",
        entry1_t: "🧸 秘密天地",
        entry1_d: "去看看我的歌单和点菜机！",
        entry2_t: "📸 瞬间记录",
        entry2_d: "这里存着莎朗亮晶晶的回忆~",
        status: "🐶 Sarang 正在想你...",
        clear: "清空",
        welcome: "汪！我是 Sarang 🐾 <br>欢迎来到我的秘密小窝！",
        input_p: "和 Sarang 聊聊吧...",
        send: "发送",
        diary_l: "莎朗的小日记：",
        diaries: ["今天天空很好看。", "想去海边。", "芒果味夏天。"],
        error: "Sarang 出错了...",
        pet_touch: ["最喜欢你了！", "我想你了", "汪，好舒服"],
        pet_favorite: "最喜欢你了！",
        pet_miss: "我想你了",
        pet_eat: "吧唧吧唧... 超级好吃！🍪",
        pet_sleep: "Zzz... 呼...",
        pet_listen: "嗯嗯，在听呢..."
    },
    'en': {
        title: "🐾 Sarang's Den 🥭",
        subtitle: "RYU SARANG",
        entry1_t: "🧸 Secret Space",
        entry1_d: "Check my playlist and menu!",
        entry2_t: "📸 Moments",
        entry2_d: "Bright memories of Sarang~",
        status: "🐶 Sarang is thinking of you...",
        clear: "Clear",
        welcome: "Woof! I'm Sarang 🐾 <br>Welcome to my secret den!",
        input_p: "Chat with Sarang...",
        send: "Send",
        diary_l: "Sarang's Diary:",
        diaries: ["The sky looks lovely today.", "I want to go to the sea.", "Mango-flavored summer."],
        error: "Sarang error...",
        pet_touch: ["Woof! Feels good~", "I miss you!", "I love you!"],
        pet_favorite: "I love you!",
        pet_miss: "I miss you!",
        pet_eat: "Munch munch... Best cookie! 🍪",
        pet_sleep: "Zzz... Hooo...",
        pet_listen: "Hmm, I'm listening..."
    },
    'ko': {
        title: "🐾 사랑이의 작은 방 🥭",
        subtitle: "류사랑 (RYU SARANG)",
        entry1_t: "🧸 비밀 공간",
        entry1_d: "나의 플레이리스트와 메뉴를 봐봐!",
        entry2_t: "📸 순간의 기록",
        entry2_d: "사랑이의 반짝이는 추억들~",
        status: "🐶 사랑이가 당신을 생각 중...",
        clear: "지우기",
        welcome: "멍멍! 나는 사랑이야 🐾 <br>나의 비밀 아지트에 온 걸 환영해!",
        input_p: "사랑이랑 대화하자...",
        send: "전송",
        diary_l: "사랑이의 일기:",
        diaries: ["오늘 하늘이 참 예뻐.", "바다에 가고 싶어.", "망고맛 여름."],
        error: "사랑이 오류...",
        pet_touch: ["멍멍! 기분 좋아~", "보고 싶었어", "네가 제일 좋아!"],
        pet_favorite: "네가 제일 좋아!",
        pet_miss: "보고 싶었어",
        pet_eat: "냠냠... 진짜 맛있다! 🍪",
        pet_sleep: "쿨쿨... 드렁...",
        pet_listen: "응응, 듣고 있어..."
    }
};

let currentLang = localStorage.getItem('pref-lang') || 'zh';
const IDLE_SRC = 'assets/pet-idle.png', EAT_SRC = 'assets/pet-eat.png', SLEEP_SRC = 'assets/pet-sleep.png';
const chatEl = document.getElementById("chat"), inputEl = document.getElementById("input"), petImg = document.getElementById('pet-img'), petSpeech = document.getElementById('pet-speech'), petContainer = document.getElementById('pet-container');
const petWrapper = document.getElementById('pet-wrapper');
const bgm = document.getElementById('bgm');
const bgmToggle = document.getElementById('bgm-toggle');
const loveSfx = document.getElementById('love-sfx');
const missSfx = document.getElementById('miss-sfx');
let idleTimer;
let isDragging = false;
let dragOffsetX = 0;
let dragOffsetY = 0;

function setPetPosition(x, y) {
    const maxX = window.innerWidth - petWrapper.offsetWidth;
    const maxY = window.innerHeight - petWrapper.offsetHeight;
    const nextX = Math.max(0, Math.min(x, maxX));
    const nextY = Math.max(0, Math.min(y, maxY));
    petWrapper.style.left = `${nextX}px`;
    petWrapper.style.top = `${nextY}px`;
    petWrapper.style.right = "auto";
    petWrapper.style.bottom = "auto";
}

function savePetPosition() {
    const rect = petWrapper.getBoundingClientRect();
    localStorage.setItem("pet-pos", JSON.stringify({ x: rect.left, y: rect.top }));
}

function restorePetPosition() {
    const raw = localStorage.getItem("pet-pos");
    if (!raw) return;
    try {
        const pos = JSON.parse(raw);
        if (typeof pos.x === "number" && typeof pos.y === "number") {
            setPetPosition(pos.x, pos.y);
        }
    } catch (_) {}
}

function changeLang(lang) {
    currentLang = lang; localStorage.setItem('pref-lang', lang);
    const t = i18n[lang];
    document.documentElement.lang = lang === 'zh' ? 'zh-CN' : lang;
    document.title = t.title;
    document.getElementById('main-title').innerText = t.title;
    document.getElementById('main-subtitle').innerText = t.subtitle;
    document.getElementById('entry1-t').innerText = t.entry1_t;
    document.getElementById('entry1-d').innerText = t.entry1_d;
    document.getElementById('entry2-t').innerText = t.entry2_t;
    document.getElementById('entry2-d').innerText = t.entry2_d;
    document.getElementById('status-txt').innerText = t.status;
    document.getElementById('clearBtn').innerText = t.clear;
    document.getElementById('input').placeholder = t.input_p;
    document.querySelectorAll('.send')[0].innerText = t.send;
    document.getElementById('diary-label').innerText = t.diary_l;
    chatEl.innerHTML = `<div class="message bot">${t.welcome}</div>`;
    const diaryList = t.diaries || [];
    if (diaryList.length > 0) {
        document.getElementById("diary").innerText = diaryList[Math.floor(Math.random() * diaryList.length)];
    }
}

// --- 宠物逻辑 ---
function sarangTalk(text, persist = false) {
    petSpeech.innerText = text; petSpeech.style.opacity = '1';
    if (!persist) setTimeout(() => { if(!petContainer.classList.contains('sleep-ani')) petSpeech.style.opacity = '0'; }, 3000);
}

function wakeUp() {
    clearTimeout(idleTimer);
    if (petContainer.classList.contains('sleep-ani')) {
        petContainer.classList.remove('sleep-ani'); petContainer.classList.add('float-ani');
        petImg.src = IDLE_SRC; petSpeech.style.opacity = '0';
    }
    startIdleTimer();
}

function goToSleep() {
    if (petContainer.classList.contains('chewing') || inputEl.value.length > 0) return;
    petContainer.classList.remove('float-ani', 'listen-ani'); petContainer.classList.add('sleep-ani');
    petImg.src = SLEEP_SRC; sarangTalk(i18n[currentLang].pet_sleep, true);
}

function startIdleTimer() { clearTimeout(idleTimer); idleTimer = setTimeout(goToSleep, 30000); }

// --- 事件 ---
inputEl.addEventListener('input', () => {
    wakeUp();
    if (inputEl.value.length > 0) {
        petContainer.classList.remove('float-ani'); petContainer.classList.add('listen-ani');
        sarangTalk(i18n[currentLang].pet_listen, true);
    } else {
        petContainer.classList.remove('listen-ani'); petContainer.classList.add('float-ani');
        petSpeech.style.opacity = '0';
    }
});

petContainer.onclick = () => {
    wakeUp(); const t = i18n[currentLang];
    const phrase = t.pet_touch[Math.floor(Math.random() * t.pet_touch.length)];
    sarangTalk(phrase);
    if (phrase === t.pet_favorite) {
        loveSfx.currentTime = 0;
        loveSfx.play().catch(() => {});
    } else if (phrase === t.pet_miss) {
        missSfx.currentTime = 0;
        missSfx.play().catch(() => {});
    }
    petContainer.style.transform = "scale(1.2)"; setTimeout(() => petContainer.style.transform="scale(1)", 200);
};

petContainer.addEventListener("pointerdown", (e) => {
    isDragging = true;
    petContainer.setPointerCapture(e.pointerId);
    const rect = petWrapper.getBoundingClientRect();
    dragOffsetX = e.clientX - rect.left;
    dragOffsetY = e.clientY - rect.top;
});

petContainer.addEventListener("pointermove", (e) => {
    if (!isDragging) return;
    setPetPosition(e.clientX - dragOffsetX, e.clientY - dragOffsetY);
});

petContainer.addEventListener("pointerup", (e) => {
    if (!isDragging) return;
    isDragging = false;
    petContainer.releasePointerCapture(e.pointerId);
    savePetPosition();
});

petContainer.addEventListener("pointercancel", () => {
    if (!isDragging) return;
    isDragging = false;
    savePetPosition();
});

document.getElementById('snack').onclick = () => {
    wakeUp(); petImg.src = EAT_SRC; sarangTalk(i18n[currentLang].pet_eat);
    petContainer.classList.remove('float-ani', 'sleep-ani', 'listen-ani');
    petContainer.classList.add('chewing');
    setTimeout(() => { petImg.src = IDLE_SRC; petContainer.classList.remove('chewing'); petContainer.classList.add('float-ani'); }, 5000);
};

bgmToggle.onclick = async () => {
    if (bgm.paused) {
        try {
            await bgm.play();
            bgmToggle.classList.add('playing');
            bgmToggle.innerText = "暂停 ⏸️";
        } catch (_) {}
    } else {
        bgm.pause();
        bgmToggle.classList.remove('playing');
        bgmToggle.innerText = "播放 ▶️";
    }
};

async function send() {
    let text = inputEl.value.trim(); if (!text) return;
    appendMsg("user", text); inputEl.value = "";
    petContainer.classList.remove('listen-ani'); petContainer.classList.add('float-ani');
    try {
        let res = await fetch("api.php", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ message: text }) });
        let data = await res.json(); appendMsg("bot", data.reply || "...");
    } catch (e) { appendMsg("bot", i18n[currentLang].error); }
    startIdleTimer();
}

function appendMsg(role, text) {
    const div = document.createElement("div"); div.className = "message " + role; div.innerText = text;
    chatEl.appendChild(div); chatEl.scrollTop = chatEl.scrollHeight;
}

document.getElementById("clearBtn").onclick = () => { chatEl.innerHTML = ""; };
inputEl.onkeydown = (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } };

restorePetPosition();
changeLang(currentLang); startIdleTimer();
</script>
</body>
</html>
