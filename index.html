<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SarangPuppyHome 🐶 izna</title>
    <style>
        :root { 
            --mango: #FFD93D; 
            --pink: #FF87B2; 
            --purple: #D1D1FF; /* 莎朗喜欢的浅紫色 */
            --brown: #8B5E3C; 
            --bg: #FFFBF2;
        }

        body { 
            background: var(--bg); 
            color: var(--brown); 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
        }

        /* 芒果掉落特效优化 */
        .mango-drop { position: fixed; top: -50px; font-size: 24px; animation: drop linear forwards; pointer-events: none; z-index: 1; opacity: 0.7; }
        @keyframes drop { to { transform: translateY(110vh) rotate(360deg); } }

        /* 顶部标题 */
        header { margin-top: 20px; text-align: center; z-index: 2; }
        h1 { margin: 0; font-size: 1.5rem; display: flex; align-items: center; gap: 10px; }
        .sub-title { font-size: 0.8rem; opacity: 0.7; }

        /* 聊天容器 */
        .chat-container { 
            width: 95%; 
            max-width: 450px; 
            background: white; 
            border: 3px solid var(--brown); 
            border-radius: 25px; 
            display: flex;
            flex-direction: column;
            height: 70vh;
            margin: 20px 0;
            box-shadow: 0 8px 0px #F0E5D0; 
            z-index: 2; 
            overflow: hidden;
        }

        #box { 
            flex: 1;
            overflow-y: auto; 
            background: #FFF9E7; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px;
            scroll-behavior: smooth;
        }

        /* 气泡样式优化 */
        .msg { 
            padding: 12px 16px; 
            border-radius: 18px; 
            font-size: 14px; 
            max-width: 85%; 
            line-height: 1.6; 
            word-wrap: break-word;
            position: relative;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .ai { 
            background: white; 
            border: 2px solid var(--mango); 
            align-self: flex-start; 
            border-bottom-left-radius: 2px;
        }
        .user { 
            background: var(--purple); /* 换成温柔的紫色 */
            border: 2px solid var(--brown);
            align-self: flex-end; 
            border-bottom-right-radius: 2px;
        }

        /* 输入区域 */
        .input-row { 
            padding: 15px;
            background: white;
            border-top: 2px dashed var(--mango);
            display: flex; 
            gap: 8px; 
        }
        input { 
            flex: 1; 
            border: 2px solid var(--brown); 
            border-radius: 15px; 
            padding: 10px 15px; 
            outline: none; 
            font-size: 14px;
        }
        input:focus { border-color: var(--pink); }
        
        button { 
            background: var(--mango); 
            border: 2px solid var(--brown); 
            border-radius: 15px; 
            padding: 0 20px; 
            cursor: pointer; 
            font-weight: bold; 
            box-shadow: 0 4px 0 var(--brown); 
            transition: 0.1s;
        }
        button:active { transform: translateY(3px); box-shadow: none; }

        /* 打字中动画 */
        .typing { font-style: italic; opacity: 0.6; font-size: 12px; }
    </style>
</head>
<body>
    <header>
        <h1>🐾 莎朗的小狗窝 <span style="font-size: 1rem;">🐶</span></h1>
        <div class="sub-title">izna Ryu Sarang · 微笑土豆聊天室</div>
    </header>

    <div class="chat-container">
        <div id="box">
            <div class="msg ai">汪！我是莎朗~ 🐶 就像我的名字一样，我会给你分享满满的爱哦！今天想跟我聊聊吗？或者...你有带芒果来吗？🥭</div>
        </div>
        <div class="input-row">
            <input type="text" id="in" placeholder="输入消息..." autocomplete="off">
            <button id="sendBtn">发送</button>
        </div>
    </div>

    <script>
        const box = document.getElementById('box');
        const input = document.getElementById('in');
        const btn = document.getElementById('sendBtn');

        // 1. 掉落芒果特效
        function createMango() {
            const m = document.createElement('div');
            m.className = 'mango-drop';
            m.innerText = ['🥭','✨','💜'][Math.floor(Math.random()*3)];
            m.style.left = Math.random() * 100 + 'vw';
            m.style.animationDuration = (Math.random() * 3 + 2) + 's';
            document.body.appendChild(m);
            setTimeout(() => m.remove(), 5000);
        }
        setInterval(createMango, 1500);

        // 2. 发送逻辑
        async function send() {
            const val = input.value.trim();
            if(!val) return;

            // 用户消息
            appendMsg(val, 'user');
            input.value = '';

            // 思考中的占位符
            const tipId = 'tip-' + Date.now();
            appendMsg('小狗正在思考中... 🐾', 'ai typing', tipId);

            try {
                const res = await fetch('api.php', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: val})
                });
                const data = await res.json();
                
                // 替换占位符内容 (对应 api.php 里的 reply 字段)
                document.getElementById(tipId).innerText = data.reply || data.error || "汪呜，听不懂呢...";
            } catch(e) {
                document.getElementById(tipId).innerText = "汪呜，网络好像掉进水里了... 🛁";
            }
            
            box.scrollTop = box.scrollHeight;
        }

        function appendMsg(text, type, id = '') {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            if(id) div.id = id;
            div.innerText = text;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        // 3. 事件监听
        btn.addEventListener('click', send);
        input.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') send();
        });
    </script>
</body>
</html>
