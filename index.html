<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>莎朗的小狗窝</title>

<style>
/* --- 保持你原有的所有 CSS 变量和样式 --- */
@import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');
:root {
    --border-color: #7a5537;
    --main-bg: #fdf6e3;
    --accent-pink: #ff8fb1;
    --accent-yellow: #ffd24d;
    --bot-bubble: #fff9eb;
    --user-bubble: #e0f2fe;
}

/* ... (此处省略你原有的 body, h1, chat-container 等样式以节省篇幅，请保留它们) ... */
/* 确保以下是你原有的基础样式 */
body { background-color: #e9e4db; background-image: radial-gradient(#d1c9bc 1px, transparent 1px); background-size: 20px 20px; font-family: 'ZCOOL KuaiLe', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; color: var(--border-color); }
.chat-container { width: min(100%, 420px); height: 70vh; background: #fff; border-radius: 30px; border: 4px solid var(--border-color); box-shadow: 10px 10px 0px rgba(122, 85, 55, 0.1); display: flex; flex-direction: column; overflow: hidden; position: relative; }
/* ... 其他原有样式 ... */

/* ------------------------------------------------ */
/* ✨ 新增：桌面宠物专属样式 */
/* ------------------------------------------------ */
#pet-wrapper {
    position: fixed;
    bottom: 100px; /* 放在饼干按钮上方 */
    right: 20px;
    z-index: 1000;
    display: flex;
    flex-direction: column;
    align-items: center;
    pointer-events: none; /* 防止容器阻挡点击 */
}

#pet-container {
    pointer-events: auto; /* 让宠物本身可以点击 */
    cursor: pointer;
    transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

#pet-img {
    width: 100px; /* 根据你的图片调整大小 */
    filter: drop-shadow(4px 4px 0px rgba(122, 85, 55, 0.2));
}

.pet-bubble {
    background: var(--bot-bubble);
    border: 3px solid var(--border-color);
    border-radius: 15px;
    padding: 8px 12px;
    margin-bottom: 10px;
    font-size: 14px;
    color: var(--border-color);
    box-shadow: 4px 4px 0px rgba(122, 85, 55, 0.1);
    opacity: 0;
    transition: opacity 0.3s;
    white-space: nowrap;
}

/* 浮动动画 */
.float-ani {
    animation: petFloat 3s ease-in-out infinite;
}

@keyframes petFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

/* 饼干按钮位置微调 */
#snack {
    position: fixed;
    right: 20px;
    bottom: 20px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: 4px solid var(--border-color);
    background: var(--accent-yellow);
    font-size: 28px;
    cursor: pointer;
    box-shadow: 4px 4px 0px var(--border-color);
    transition: 0.2s;
    z-index: 1001;
}
</style>
</head>

<body>

<h1>🐾 莎朗的小狗窝 🥭</h1>
<div class="subtitle">RYU SARANG</div>

<div id="pet-wrapper">
    <div id="pet-speech" class="pet-bubble">摸摸我~</div>
    <div id="pet-container" class="float-ani">
        <img id="pet-img" src="assets/pet-idle.png" alt="Sarang Pet">
    </div>
</div>

<button id="snack">🍪</button>

<script>
/* ------------------------------------------------ */
/* ✨ 新增：桌面宠物互动逻辑 */
/* ------------------------------------------------ */
const petImg = document.getElementById('pet-img');
const petSpeech = document.getElementById('pet-speech');
const petContainer = document.getElementById('pet-container');
const snackBtn = document.getElementById('snack');

const IDLE_SRC = 'assets/pet-idle.png';
const EAT_SRC = 'assets/pet-eat.png';

// 宠物说话
function sarangTalk(text) {
    petSpeech.innerText = text;
    petSpeech.style.opacity = '1';
    setTimeout(() => { petSpeech.style.opacity = '0'; }, 3000);
}

// 点击宠物反馈
petContainer.addEventListener('click', () => {
    const lines = ["汪！是在摸我吗？", "嘿嘿，好痒呀~", "莎朗最喜欢你了！🐾"];
    const randomLine = lines[Math.floor(Math.random() * lines.length)];
    sarangTalk(randomLine);
    
    // 缩放特效
    petContainer.style.transform = "scale(1.2)";
    setTimeout(() => { petContainer.style.transform = "scale(1)"; }, 200);
});

// 喂食饼干逻辑
snackBtn.addEventListener('click', () => {
    // 1. 切换图片
    petImg.src = EAT_SRC;
    sarangTalk("吧唧吧唧... 谢谢你的饼干！🍪");
    
    // 2. 喂食动画 (跳一下)
    petContainer.classList.remove('float-ani');
    petContainer.style.transform = "translateY(-30px) scale(1.1)";
    
    // 3. 2秒后恢复正常
    setTimeout(() => {
        petImg.src = IDLE_SRC;
        petContainer.style.transform = "translateY(0) scale(1)";
        petContainer.classList.add('float-ani');
    }, 2000);
});
</script>

</body>
</html>
