<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>莎朗的小狗窝</title>

<style>

body{
background:#e9e4db;
font-family: "PingFang SC", sans-serif;
display:flex;
flex-direction:column;
align-items:center;
margin:0;
padding:40px;
}

h1{
color:#7a5537;
font-size:28px;
margin-bottom:5px;
}

.subtitle{
color:#ff6b9a;
margin-bottom:25px;
font-weight:bold;
}

/* 聊天框 */

.chat-container{
width:min(100%,420px);
max-height:90vh;
background:#efe8dc;
border-radius:30px;
border:4px solid #8b5e3c;
box-shadow:0 10px 20px rgba(0,0,0,0.15);
display:flex;
flex-direction:column;
overflow:hidden;
}

.message.typing{
font-style:italic;
opacity:0.8;
position:relative;
}

.message.typing::after{
content:"正在思考...";
position:absolute;
right:14px;
bottom:10px;
font-size:12px;
color:#7a5537;
animation: blink 1.2s ease-in-out infinite;
}

@keyframes blink{
50%{opacity:0.2;}
}

/* 顶部信息 */

.status-bar{
padding:15px;
font-size:13px;
color:#7b5a40;
border-bottom:2px dashed #e3b83a;
position:relative;
}

.status-bar button.clear{
position:absolute;
top:12px;
right:14px;
background:transparent;
border:1px solid rgba(123, 90, 64, 0.7);
border-radius:14px;
padding:2px 8px;
font-size:12px;
cursor:pointer;
color:#7b5a40;
}

.status-bar button.clear:hover{
background:rgba(255,255,255,0.85);
}

/* 聊天区 */

.chat-box{
flex:1;
padding:15px;
overflow-y:auto;
}

/* 聊天气泡 */

.message{
padding:10px 14px;
border-radius:14px;
margin:8px 0;
max-width:75%;
font-size:14px;
}

.bot{
background:#fff4dc;
color:#5a3c28;
}

.user{
background:#dff1ff;
margin-left:auto;
}

/* 快捷问题 */

.quick{
padding:10px;
border-top:1px solid #e4d6c5;
}

.quick button{
background:#fff2cc;
border:none;
padding:6px 10px;
border-radius:10px;
margin:3px;
cursor:pointer;
font-size:12px;
}

/* 输入区 */

.input-area{
display:flex;
padding:10px;
border-top:3px dashed #e3b83a;
background:#efe8dc;
gap:10px;
}

input,
textarea{
flex:1;
border-radius:20px;
border:2px solid #c9a27b;
padding:10px;
outline:none;
resize:none;
font-family:inherit;
}

textarea{
min-height:42px;
max-height:120px;
}

button.send{
background:#ffd24d;
border:none;
padding:10px 18px;
border-radius:20px;
cursor:pointer;
font-weight:bold;
}

/* 日记 */

.diary{
padding:10px 15px;
font-size:13px;
color:#8c6b50;
border-top:1px solid #e2d3c2;
}

/* 小彩蛋 */

#snack{
position:fixed;
right:30px;
bottom:120px;
width:45px;
height:45px;
border-radius:50%;
border:none;
background:#ffd24d;
font-size:20px;
cursor:pointer;
box-shadow:0 5px 10px rgba(0,0,0,0.2);
}



.entry-card{
display:block;
width:420px;
margin-bottom:16px;
background:#fff4dc;
border:3px solid #c9a27b;
border-radius:18px;
padding:12px 14px;
text-decoration:none;
color:#5a3c28;
box-shadow:0 6px 12px rgba(0,0,0,.12);
transition:transform .15s ease, box-shadow .15s ease;
}

.entry-card:hover{
transform:translateY(-2px);
box-shadow:0 10px 16px rgba(0,0,0,.15);
}

.entry-title{
font-size:16px;
font-weight:700;
}

.entry-desc{
font-size:13px;
margin-top:6px;
}

footer{
margin-top:15px;
font-size:12px;
color:#8b7b6c;
}

</style>
</head>


<body>

<h1>🐾 莎朗的小狗窝 🥭</h1>
<div class="subtitle">RYU SARANG</div>


<a class="entry-card" href="body.html">
<div class="entry-title">🧸 进入莎朗的小天地</div>
<div class="entry-desc">点击这里跳转到 body.html，查看独立内容页</div>
</a>


<div class="chat-container">

<div class="status-bar">
🐶 sarang在线中<br>
📅 今天是 <span id="date"></span>
<button id="clearBtn" class="clear" title="清空聊天">清空</button>
</div>


<div class="chat-box" id="chat">

<div class="message bot">
注！我是sarang 欢迎来到我的秘密小窝！  
在这里我们可以聊梦想。
</div>

</div>


<div class="quick">

<button onclick="ask('今天开心吗？')">今天开心吗</button>
<button onclick="ask('给我讲个故事')">讲个故事</button>
<button onclick="ask('推荐一首歌')">推荐一首歌</button>

</div>


<div class="diary">
📖 sarang的小日记：  
<span id="diary"></span>
</div>


<div class="input-area">

<textarea id="input" placeholder="和sarang聊聊吧..." rows="1"></textarea>

<button class="send" onclick="send()">发送</button>

</div>

</div>


<footer>
🐾 一个可以聊天、发呆、做梦的小地方
</footer>


<button id="snack">🍪</button>


<script>

/* 日期 */

document.getElementById("date").innerText =
new Date().toLocaleDateString();


/* 日记 */

const diary = [
"今天的天空很好看。",
"如果可以的话，我想去海边。",
"芒果真的很像夏天。",
"聊天也是一种旅行。",
"秋天是不是有芒果味？"
];

document.getElementById("diary").innerText =
diary[Math.floor(Math.random()*diary.length)];


/* 本地存储（简单会话记忆） */
const STORAGE_KEY = 'sarang-chat-history';
const inputEl = document.getElementById("input");
const chatEl = document.getElementById("chat");
const defaultIntroHTML = chatEl.innerHTML;
const sendBtn = document.querySelector("button.send");
const clearBtn = document.getElementById("clearBtn");

inputEl.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

function saveHistory(){
  const messages = Array.from(chatEl.querySelectorAll(".message")).map(el => ({
    role: el.classList.contains("user") ? "user" : "bot",
    text: el.innerText
  }));
  localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
}

function loadHistory(){
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) return;

  try {
    const messages = JSON.parse(raw);
    if (!Array.isArray(messages) || messages.length === 0) return;

    chatEl.innerHTML = "";
    for (const msg of messages) {
      const div = document.createElement("div");
      div.className = "message " + (msg.role === "user" ? "user" : "bot");
      div.innerText = msg.text;
      chatEl.appendChild(div);
    }
    scrollToBottom();
  } catch (e) {
    console.warn("加载聊天记录失败", e);
  }
}

function setLoading(loading){
  sendBtn.disabled = loading;
  inputEl.disabled = loading;
  sendBtn.innerText = loading ? "发送中..." : "发送";
}

function ask(text){
  inputEl.value = text;
  inputEl.focus();
}

function clearChat(){
  chatEl.innerHTML = defaultIntroHTML;
  saveHistory();
  scrollToBottom();
}


/* 发送消息 */

async function send(){
  if (sendBtn.disabled) return;

  let text = inputEl.value.trim();
  if(!text) return;

  /* 用户气泡 */
  let user = document.createElement("div");
  user.className="message user";
  user.innerText=text;
  chatEl.appendChild(user);

  inputEl.value="";
  scrollToBottom();

  /* 等待消息 */
  let typing = document.createElement("div");
  typing.className="message bot typing";
  typing.innerText = "";
  chatEl.appendChild(typing);
  scrollToBottom();

  setLoading(true);

  /* 调用API */
  let data;
  try {
    let res = await fetch("api.php",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({message:text})
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || `HTTP ${res.status}`);
    }

    data = await res.json();
  } catch (err) {
    data = { reply: `sarang 出状况了：${err.message}` };
  }

  /* AI回复 */
  typing.remove();

  let bot = document.createElement("div");
  bot.className="message bot";
  bot.innerText=data.reply || "sarang好像在发呆...";
  chatEl.appendChild(bot);

  scrollToBottom();
  saveHistory();
  setLoading(false);
}


/* 彩蛋 */

document.getElementById("snack").onclick=function(){
alert("sarang：谢谢你的小零食！🐶");
}

</script>


</body>
</html>
