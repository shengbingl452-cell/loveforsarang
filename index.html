<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>莎朗的小狗窝</title>

<style>

body{
background:#e9e4db;
font-family: "PingFang SC", sans-serif;
display:flex;
flex-direction:column;
align-items:center;
margin:0;
padding:40px;
}

h1{
color:#7a5537;
font-size:28px;
margin-bottom:5px;
}

.subtitle{
color:#ff6b9a;
margin-bottom:25px;
font-weight:bold;
}

/* 聊天框 */

.chat-container{
width:420px;
height:600px;
background:#efe8dc;
border-radius:30px;
border:4px solid #8b5e3c;
box-shadow:0 10px 20px rgba(0,0,0,0.15);
display:flex;
flex-direction:column;
overflow:hidden;
}

/* 顶部信息 */

.status-bar{
padding:15px;
font-size:13px;
color:#7b5a40;
border-bottom:2px dashed #e3b83a;
}

/* 聊天区 */

.chat-box{
flex:1;
padding:15px;
overflow-y:auto;
}

/* 聊天气泡 */

.message{
padding:10px 14px;
border-radius:14px;
margin:8px 0;
max-width:75%;
font-size:14px;
}

.bot{
background:#fff4dc;
color:#5a3c28;
}

.user{
background:#dff1ff;
margin-left:auto;
}

/* 快捷问题 */

.quick{
padding:10px;
border-top:1px solid #e4d6c5;
}

.quick button{
background:#fff2cc;
border:none;
padding:6px 10px;
border-radius:10px;
margin:3px;
cursor:pointer;
font-size:12px;
}

/* 输入区 */

.input-area{
display:flex;
padding:10px;
border-top:3px dashed #e3b83a;
background:#efe8dc;
}

input{
flex:1;
border-radius:20px;
border:2px solid #c9a27b;
padding:10px;
outline:none;
}

button.send{
margin-left:10px;
background:#ffd24d;
border:none;
padding:10px 18px;
border-radius:20px;
cursor:pointer;
font-weight:bold;
}

/* 日记 */

.diary{
padding:10px 15px;
font-size:13px;
color:#8c6b50;
border-top:1px solid #e2d3c2;
}

/* 小彩蛋 */

#snack{
position:fixed;
right:30px;
bottom:120px;
width:45px;
height:45px;
border-radius:50%;
border:none;
background:#ffd24d;
font-size:20px;
cursor:pointer;
box-shadow:0 5px 10px rgba(0,0,0,0.2);
}

footer{
margin-top:15px;
font-size:12px;
color:#8b7b6c;
}

</style>
</head>


<body>

<h1>🐾 莎朗的小狗窝 🥭</h1>
<div class="subtitle">RYU SARANG</div>


<div class="chat-container">

<div class="status-bar">
🐶 sarang在线中<br>
📅 今天是 <span id="date"></span>
</div>


<div class="chat-box" id="chat">

<div class="message bot">
注！我是sarang 欢迎来到我的秘密小窝！  
在这里我们可以聊梦想。
</div>

</div>


<div class="quick">

<button onclick="ask('今天开心吗？')">今天开心吗</button>
<button onclick="ask('给我讲个故事')">讲个故事</button>
<button onclick="ask('推荐一首歌')">推荐一首歌</button>

</div>


<div class="diary">
📖 sarang的小日记：  
<span id="diary"></span>
</div>


<div class="input-area">

<input id="input" placeholder="和sarang聊聊吧..." />

<button class="send" onclick="send()">发送</button>

</div>

</div>


<footer>
🐾 一个可以聊天、发呆、做梦的小地方
</footer>


<button id="snack">🍪</button>


<script>

/* 日期 */

document.getElementById("date").innerText =
new Date().toLocaleDateString();


/* 日记 */

const diary = [
"今天的天空很好看。",
"如果可以的话，我想去海边。",
"芒果真的很像夏天。",
"聊天也是一种旅行。",
"秋天是不是有芒果味？"
];

document.getElementById("diary").innerText =
diary[Math.floor(Math.random()*diary.length)];


/* 快捷提问 */

function ask(text){
document.getElementById("input").value = text;
}


/* 发送消息 */

async function send(){

let input = document.getElementById("input");
let chat = document.getElementById("chat");

let text = input.value.trim();

if(!text) return;

/* 用户气泡 */

let user = document.createElement("div");
user.className="message user";
user.innerText=text;
chat.appendChild(user);

input.value="";

chat.scrollTop = chat.scrollHeight;


/* 调用API */

let data;

try {
let res = await fetch("api.php",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message:text})
});

if(!res.ok){
throw new Error("请求失败：" + res.status);
}

data = await res.json();
} catch (e) {
data = { reply: "网络有点不稳定，请稍后再试一次哦 🐶" };
console.error(e);
}


/* AI回复 */

let bot = document.createElement("div");
bot.className="message bot";
bot.innerText=data.reply || "sarang好像在发呆...";
chat.appendChild(bot);

chat.scrollTop = chat.scrollHeight;

}


/* 彩蛋 */

document.getElementById("snack").onclick=function(){
alert("sarang：谢谢你的小零食！🐶");
}

</script>


</body>
</html>
